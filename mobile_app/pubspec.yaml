name: minimaps_mobile
description: Flutter navigation client for the Minimaps ESP32 TFT display.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^2.3.10
  flutter_compass: ^0.8.1
  geolocator: ^14.0.3
  http: ^1.6.0
  permission_handler: ^12.0.3
  vietmap_flutter_gl: ^4.1.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
